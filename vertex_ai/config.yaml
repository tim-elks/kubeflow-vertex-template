# Vertex AI pipeline configuration
# Update these values before submitting a pipeline run.

gcp:
  project_id: your-project-id
  region: us-central1
  # GCS bucket used by Vertex AI for pipeline artifacts
  pipeline_root: gs://your-bucket/pipeline-root

pipeline:
  # Path to the compiled KFP pipeline spec (generated by pipeline/pipeline.py)
  spec_path: pipeline/pipeline.yaml
  display_name: kubeflow-vertex-template-pipeline

  # Default parameter values (can be overridden at submission time)
  parameters:
    dataset_name: imdb
    config_name: default
    model_name: distilbert-base-uncased
    text_column: text
    test_size: 0.2
    max_length: 128
    num_labels: 2
    num_epochs: 3
    per_device_batch_size: 16
    learning_rate: 0.00002

  # Optional: enable caching so unchanged steps are not re-executed
  enable_caching: true
